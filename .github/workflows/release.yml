name: Release Assets

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build assets
        run: scripts/build-release.sh "${{ github.ref_name }}"

      - name: Verify version stamp matches tag
        run: |
          binary="dist/jira_${GITHUB_REF_NAME}_linux_amd64"
          got="$("$binary" version)"
          want="jira ${GITHUB_REF_NAME}"
          if [ "$got" != "$want" ]; then
            echo "version stamp mismatch: got '$got' want '$want' (check the -ldflags -X path in scripts/build-release.sh)" >&2
            exit 1
          fi
          echo "version stamp OK: $got"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --verify-tag
          else
            gh release create "$tag" --title "$tag" --verify-tag --generate-notes
          fi

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" dist/* --clobber
